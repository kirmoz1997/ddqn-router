name: Bug report
description: Report a bug or unexpected behavior in ddqn-router
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report! Please fill in the fields below so we
        can reproduce and diagnose quickly.

  - type: input
    id: version
    attributes:
      label: ddqn-router version
      description: Output of `pip show ddqn-router` or the tag you cloned.
      placeholder: "0.3.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.6"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.4 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: Exact commands / Python snippet that reproduces the problem.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full traceback or log output where relevant.
      render: shell
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Config snippets, dataset size, artifacts path, anything else useful.
