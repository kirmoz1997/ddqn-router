name: Feature request
description: Suggest an improvement or new capability for ddqn-router
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do? What hurts today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you'd like to see. Be concrete about API/CLI surfaces.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you rejected them.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to related issues, prior art, mockups, etc.
