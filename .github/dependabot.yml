version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    target-branch: main
    assignees:
      - kirmoz1997
    groups:
      python-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    target-branch: main
    assignees:
      - kirmoz1997
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
